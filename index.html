<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
      <div class="container">
        <a class="navbar-brand">My IMAGE GALLERY</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto" id="navbar-links">
            <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#sign-in">Sign in</a></li>
            <li class="nav-item"><a class="nav-link" href="#sign-up">Sign up</a></li>
            <li class="nav-item"><a class="nav-link" href="#Profile">Profile</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Hero / Description -->
  <div class="hero">
    <h1>Image Gallery</h1>
    <p>Welcome to my beautiful image gallery! Here you can explore stunning photos
      of nature, cities, and animals. Use the buttons below to filter images or
      click on any picture to view it in full-screen lightbox mode. 💫</p>
  </div>

  <!-- Filter Buttons -->
  <div class="image-btn">
    <div class="filter-buttons">
      <button onclick="filterImages('all')">All</button>
      <button onclick="filterImages('nature')">Nature</button>
      <button onclick="filterImages('flower')">Flower</button>
      <button onclick="filterImages('other')">Other</button>
    </div>
  </div>

  <!-- Gallery -->
  <section>
    <div class="gallery">

      <!-- Nature -->
      <div class="gallery-item nature">
        <img src="https://images.unsplash.com/photo-1546587348-d12660c30c50?ixlib=rb-4.1.0&auto=format&fit=crop&q=60&w=800" alt="nature" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item nature">
        <img src="https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?cs=srgb&dl=pexels-souvenirpixels-417074.jpg&fm=jpg" alt="natural image" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item nature">
        <img src="https://media.istockphoto.com/id/2213108798/photo/young-green-seedling-sprouting-from-soil-with-soft-natural-background.webp?a=1&b=1&s=612x612&w=0&k=20&c=Vz7CniXdm0deqouTmXmBiUECwBuxbnOBSlTqKiLgxj8=" alt="seedling" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item nature">
        <img src="https://plus.unsplash.com/premium_photo-1673697239981-389164b7b87f?ixlib=rb-4.1.0&auto=format&fit=crop&q=60&w=500" alt="river" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item nature">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=974" alt="natural beauty" onclick="openLightbox(this)">
      </div>

      <!-- Flowers -->
      <div class="gallery-item flower">
        <img src="https://thumbs.dreamstime.com/b/wildflowers-blooming-sunset-nature-scenery-wildflowers-blooming-sunset-nature-scenery-388164189.jpg" alt="wildflowers" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://media.istockphoto.com/id/1394440950/photo/natural-view-cosmos-filed-and-sunset-on-garden-background.webp?b=1&s=612x612&w=0&k=20&c=o3n-h2j4aBnaDqKeY-876cTRm1DLOsZcCjcfDZf_9TQ=" alt="cosmos flowers" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://images.pexels.com/photos/736230/pexels-photo-736230.jpeg" alt="rose" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://images.pexels.com/photos/931162/pexels-photo-931162.jpeg" alt="flowers" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://plus.unsplash.com/premium_photo-1711434824963-ca894373272e?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=415" alt="beautiful place" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://images.unsplash.com/photo-1523224042829-4731dd15a3bb?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=388" alt="flower close up" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://images.unsplash.com/photo-1527061011665-3652c757a4d4?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=386" alt="beautiful rose" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://media.istockphoto.com/id/2194076538/photo/panoramic-colorful-meadow.webp?a=1&b=1&s=612x612&w=0&k=20&c=1gLFuYhrcA3CFxrb812CcqvRLM9Fm9khdb7t58vsMDI=" alt="colorful meadow" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://images.unsplash.com/photo-1690121013896-828f1b536dd6?ixlib=rb-4.1.0&auto=format&fit=crop&q=60&w=800" alt="nature flower" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item flower">
        <img src="https://plus.unsplash.com/premium_photo-1711246567314-597d57ad975d?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=870" alt="flowers" onclick="openLightbox(this)">
      </div>

      <!-- Other / Birds -->
      <div class="gallery-item other">
        <img src="https://images.pexels.com/photos/70577/sunset-birds-flying-sky-70577.jpeg" alt="birds at sunset" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.pexels.com/photos/33101/new-wing-emergency-at-the-moment.jpg" alt="bird wing" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.pexels.com/photos/3037435/pexels-photo-3037435.jpeg" alt="animal" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.pexels.com/photos/132479/pexels-photo-132479.jpeg" alt="animal" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.unsplash.com/photo-1444465693019-aa0b6392460d?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=870" alt="birds" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.unsplash.com/photo-1620694563886-c3a80ec55f41?ixlib=rb-4.1.0&auto=format&fit=crop&q=60&w=500" alt="birds" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://images.unsplash.com/photo-1626444344029-5c680f7513c1?ixlib=rb-4.1.0&auto=format&fit=crop&q=60&w=500" alt="flying bird" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://plus.unsplash.com/premium_photo-1724864863815-1469c8b74711?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=1374" alt="birds" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://media.istockphoto.com/id/814322970/photo/flock-of-bird-flying-at-sunset-over-a-lake.jpg?s=612x612&w=0&k=20&c=7JjwtK3886kn2a_R9jAhbeWpl8eJO7iBr70lrjvSTao=" alt="flock of birds" onclick="openLightbox(this)">
      </div>
      <div class="gallery-item other">
        <img src="https://plus.unsplash.com/premium_photo-1666777246899-053e06efdb35?ixlib=rb-4.1.0&auto=format&fit=crop&q=80&w=1470" alt="birds" onclick="openLightbox(this)">
      </div>

    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img class="lightbox-content" id="lightbox-img" alt="Enlarged view">
    <a class="prev" onclick="changeImage(-1)">&#10094;</a>
    <a class="next" onclick="changeImage(1)">&#10095;</a>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script src="home.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
